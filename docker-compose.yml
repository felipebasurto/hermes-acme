services:
  acme-hermes:
    image: nousresearch/hermes-agent:latest
    container_name: acme-hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
      - "9119:9119"
    volumes:
      - ./data/hermes:/opt/data
      - ./seed/company-docs:/workspace/docs:ro
    environment:
      HERMES_DASHBOARD: "1"
      HERMES_DASHBOARD_BASIC_AUTH_USERNAME: acme
      HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: changeme
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
