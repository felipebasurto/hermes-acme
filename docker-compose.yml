services:
  # --- Agente Hermes headless (gateway backend) ---
  acme-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: acme-hermes-agent:local
    container_name: acme-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      - ./data/hermes:/opt/data
      - hermes-agent-src:/opt/hermes
      - ./seed/company-docs:/workspace/docs:ro
    environment:
      HERMES_HOME: /opt/data
      HERMES_DASHBOARD: "0"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: "acme-demo-local-key"
      API_SERVER_MODEL_NAME: "acme-agent"
      HERMES_UID: ${UID:-1000}
      HERMES_GID: ${GID:-1000}
    networks:
      - acme-net

  # --- GUI agente nativa (fork hermes-webui) ---
  acme-webui:
    build:
      context: .
      dockerfile: docker/webui/Dockerfile
    image: acme-hermes-webui:local
    container_name: acme-webui
    restart: unless-stopped
    depends_on:
      - acme-agent
    ports:
      - "8787:8787"
    volumes:
      - ./data/hermes:/home/hermeswebui/.hermes
      - hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent:ro
      - ./seed/company-docs:/workspace/docs:ro
    environment:
      HERMES_HOME: /home/hermeswebui/.hermes
      HERMES_WEBUI_HOST: "0.0.0.0"
      HERMES_WEBUI_PORT: "8787"
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
      HERMES_WEBUI_BOT_NAME: "Asistente Acme"
      HERMES_WEBUI_DEFAULT_LOCALE: "es-ES"
      HERMES_WEBUI_DEFAULT_WORKSPACE: "/workspace/docs"
      ACME_UI_DEMO_LOGIN: "1"
      ACME_ADMIN_USERNAME: "admin"
      ACME_ADMIN_PASSWORD: "acme-admin-demo"
      ACME_USER_USERNAME: "operador"
      ACME_USER_PASSWORD: "acme-user-demo"
      ACME_USER_WORKSPACE: "/workspace/docs"
      WANTED_UID: ${UID:-1000}
      WANTED_GID: ${GID:-1000}
    networks:
      - acme-net

networks:
  acme-net:
    driver: bridge

volumes:
  hermes-agent-src:
