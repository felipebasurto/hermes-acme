version: 6
locale: es-ES
theme: acme-industrial
# v6 UX: Claude/Codex-familiar shell. No icon rail. Navigation lives in the
# sidebar footer (Documentación, and Configuración for admin). The conversation
# list is the home surface; the brand lockup returns to it.
layout:
  shell: claude-like
  rail: hidden
  sidebar_width_px: 272
  sidebar_footer_actions:
    usuario: [workspaces]
    admin: [workspaces, settings]
workspace:
  docs_path: /workspace/docs
  readonly_for: [usuario]
demo_credentials:
  admin:
    username: admin
    password_env: ACME_ADMIN_PASSWORD
    password_demo: acme-admin-demo
    display_role: Administrador
  usuario:
    username: operador
    password_env: ACME_USER_PASSWORD
    password_demo: acme-user-demo
    display_role: Operador
roles:
  admin:
    label: Administrador
    panels:
      - chat
      - workspaces
      - skills
      - memory
      - tasks
      - kanban
      - todos
      - profiles
      - logs
      - insights
      - settings
    settings_sections:
      - conversation
      - appearance
      - preferences
      - providers
      - plugins
      - system
      - help
  usuario:
    label: Operador
    panels:
      - chat
      - workspaces
    settings_sections: []
labels:
  chat: Conversación
  workspaces: Documentación
  skills: Procedimientos
  memory: Memoria
  tasks: Tareas
  kanban: Kanban
  todos: Lista actual
  profiles: Perfiles
  logs: Registros
  insights: Indicadores
  settings: Configuración
