name: acme
label: Acme Industrial
description: Acero industrial con acentos ámbar y azul — Acme Maquinaria Especial Burgos

palette:
  background:
    hex: "#1a1f26"
    alpha: 1.0
  midground:
    hex: "#64748b"
    alpha: 1.0
  foreground:
    hex: "#f59e0b"
    alpha: 0.15
  warmGlow: "rgba(245, 158, 11, 0.25)"
  noiseOpacity: 0.4

typography:
  fontSans: "IBM Plex Sans, system-ui, sans-serif"
  fontMono: "IBM Plex Mono, ui-monospace, monospace"
  fontUrl: "https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
  baseSize: "15px"
  lineHeight: "1.55"

layout:
  radius: "0.375rem"
  density: comfortable

layoutVariant: standard

colorOverrides:
  primary: "#2563eb"
  primaryForeground: "#f8fafc"
  accent: "#f59e0b"
  accentForeground: "#1a1f26"
  ring: "#3b82f6"

assets:
  logo: "/dashboard-themes/assets/logo.svg"

tagline: Acme Maquinaria Especial Burgos

customCSS: |
  [data-theme="acme"] header {
    border-bottom: 1px solid color-mix(in srgb, #64748b 40%, transparent);
  }
